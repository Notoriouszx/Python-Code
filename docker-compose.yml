services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: biometric
      POSTGRES_PASSWORD: biometric
      POSTGRES_DB: biometric
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biometric -d biometric"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://biometric:biometric@db:5432/biometric
      JWT_SECRET: change-me-in-production
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro

volumes:
  pgdata:
